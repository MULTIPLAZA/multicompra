<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiCompra — Compras</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('multicompra:theme');
        if (!t) {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .list-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: var(--sp-3) var(--sp-4) 0;
    }
    .table-host {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .table tbody tr { cursor: pointer; }

    .badge-con-diferencias   { background: var(--warning-soft); color: var(--warning-text); }
    .badge-error-sinc        { background: var(--danger-soft);  color: var(--danger-text); }

    .filter-states {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      flex-wrap: wrap;
    }
    .filter-states .chip-estado {
      padding: 0 var(--sp-2);
      height: 24px;
      font-size: var(--fs-xs);
    }

    .alert-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-4);
      background: var(--danger-soft);
      color: var(--danger-text);
      border-bottom: 1px solid var(--danger);
      font-size: var(--fs-sm);
    }
    .alert-bar .grow { flex: 1; }
    .alert-bar a {
      color: var(--danger-text);
      font-weight: 600;
      text-decoration: underline;
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      font-size: var(--fs-sm);
      color: var(--text-muted);
    }

    .cta-primary { background: var(--primary); color: var(--primary-on); border-color: var(--primary); }
    .cta-primary:hover { background: var(--primary-hover); }

    .empty-state {
      padding: var(--sp-10) var(--sp-6);
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state h3 { color: var(--text-strong); margin-bottom: var(--sp-2); }
  </style>
</head>
<body>

<div class="app" id="app">

  <header class="app-header" role="banner">
    <button class="btn btn-ghost btn-icon" id="btn-toggle-sidebar" aria-label="Expandir/colapsar menú lateral" title="Expandir/colapsar menú">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 4h16v4H4zM4 10h16v10H4z"/></svg>
      <span class="logo-text">MultiCompra</span>
    </div>
    <nav class="breadcrumbs" aria-label="Ubicación">
      <a href="dashboard.html">Inicio</a>
      <span class="sep">&rsaquo;</span>
      <span class="current">Compras</span>
    </nav>
    <div class="grow"></div>
    <div class="header-search">
      <input type="search" class="input input-search" placeholder="Buscar en la app&hellip;  (Ctrl+K)" aria-label="Buscador global" />
    </div>
    <div class="user-chip" id="avatar-btn" tabindex="0" role="button" aria-label="Menú de usuario" aria-haspopup="true" aria-expanded="false">
      <span class="avatar" aria-hidden="true">SH</span>
      <span>Hola Shirley</span>
    </div>
  </header>

  <aside class="app-sidebar" aria-label="Navegación principal">
    <nav class="nav">
      <a class="nav-item" href="dashboard.html" data-label="Dashboard">
        <span class="nav-item-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span>
        <span class="nav-item-label">Dashboard</span>
      </a>
      <a class="nav-item" href="dashboard.html" data-label="OPs pendientes">
        <span class="nav-item-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
        <span class="nav-item-label">OPs pendientes</span>
      </a>
      <a class="nav-item" href="oc-lista.html" data-label="OCs">
        <span class="nav-item-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3zM3 9h18v4H3zM3 15h18v4H3z"/></svg></span>
        <span class="nav-item-label">OCs</span>
      </a>
      <a class="nav-item active" href="compra-lista.html" data-label="Compras" aria-current="page">
        <span class="nav-item-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span>
        <span class="nav-item-label">Compras</span>
      </a>
      <a class="nav-item" href="solicitudes-alta.html" data-label="Altas pendientes">
        <span class="nav-item-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>
        <span class="nav-item-label">Altas pendientes</span>
        <span class="nav-item-count" id="nav-count-altas" hidden>0</span>
      </a>
      <a class="nav-item" href="catalogo.html" data-label="Catálogo">
        <span class="nav-item-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
        <span class="nav-item-label">Catálogo</span>
      </a>
    </nav>
  </aside>

  <main class="app-main">

    <div class="screen-subheader">
      <h1 class="screen-title">Compras</h1>
      <span class="chip chip-timestamp" id="count-total">0 compras</span>
      <div class="grow"></div>
      <a href="compra-nueva.html" class="btn cta-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        Nueva Compra
      </a>
    </div>

    <!-- Alerta de compras en error -->
    <div class="alert-bar" id="alert-errores" style="display: none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="alert-errores-text">&mdash;</span>
      <div class="grow"></div>
      <a href="#" id="alert-errores-link">Revisar</a>
    </div>

    <div class="filter-bar" role="region" aria-label="Filtros">
      <div style="position: relative;">
        <input type="search" id="filter-search" class="input input-search input-sm" placeholder="Buscar por código, OC, nro comprobante…" aria-label="Buscar compras" style="padding-left: 28px; width: 280px;" />
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-subtle);" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>

      <select id="filter-proveedor" class="select input-sm" aria-label="Filtrar por proveedor" style="width: 220px;">
        <option value="">Todos los proveedores</option>
      </select>

      <input type="date" id="filter-desde" class="input input-sm" aria-label="Fecha desde" style="width: 150px;" />
      <span class="text-muted text-xs">a</span>
      <input type="date" id="filter-hasta" class="input input-sm" aria-label="Fecha hasta" style="width: 150px;" />

      <div class="divider-v" aria-hidden="true"></div>

      <div class="filter-states" role="group" aria-label="Filtrar por estado">
        <button class="chip chip-estado" data-estado="precargada"           aria-pressed="false">Precargada</button>
        <button class="chip chip-estado" data-estado="en_verificacion"      aria-pressed="false">En verificación</button>
        <button class="chip chip-estado" data-estado="con_diferencias"      aria-pressed="false">Con diferencias</button>
        <button class="chip chip-estado" data-estado="confirmada"           aria-pressed="false">Confirmada</button>
        <button class="chip chip-estado" data-estado="error_sincronizacion" aria-pressed="false">Error sinc.</button>
        <button class="chip chip-estado" data-estado="anulada"              aria-pressed="false">Anulada</button>
      </div>

      <span class="filter-count" id="filter-count" style="margin-left: auto; font-size: var(--fs-sm); color: var(--text-muted);">
        <strong id="count-visible">0</strong> visibles
      </span>
    </div>

    <div class="list-wrap">
      <div class="table-host">
        <table class="table" id="comp-table" aria-label="Listado de Compras">
          <thead>
            <tr>
              <th style="width: 120px;">Código</th>
              <th style="width: 110px;">OC</th>
              <th>Proveedor</th>
              <th style="width: 130px;">Fecha factura</th>
              <th style="width: 160px;">Nro comprobante</th>
              <th class="col-num" style="width: 150px;">Total Gs</th>
              <th style="width: 150px;">Estado</th>
              <th style="width: 80px;" class="cell-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="comp-tbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span id="pagination-info">&mdash;</span>
      </div>
    </div>

  </main>

</div>

<script type="module">
  import { comprasHistorico, proveedores as proveedoresMock, fmtGs, fmtFecha, solicitudesAltaProducto } from '../shared/mock-data.js';
  import { isCargado, getProveedores as _getProvReales } from '../shared/data.js';
  import { initSidebarClickOutside, initAvatarMenu, updateAltasBadge } from '../shared/ui.js';

  // Proveedores reales mergeados con el mock para que los nombres se vean reales
  const proveedores = isCargado()
    ? [..._getProvReales().map(p => ({ id: p.id, nombre: p.nombre, ruc: p.ruc || '' })), ...proveedoresMock]
    : proveedoresMock;

  const ESTADO_BADGE = {
    precargada:           { cls: 'badge-precargada',        txt: 'Precargada' },
    en_verificacion:      { cls: 'badge-en-verificacion',   txt: 'En verificación' },
    con_diferencias:      { cls: 'badge-con-diferencias',   txt: 'Con diferencias' },
    confirmada:           { cls: 'badge-confirmada',        txt: 'Confirmada' },
    error_sincronizacion: { cls: 'badge-error-sinc',        txt: 'Error sinc.' },
    anulada:              { cls: 'badge-anulada',           txt: 'Anulada' }
  };

  const state = {
    search: '',
    proveedor: '',
    desde: '',
    hasta: '',
    estados: new Set()
  };

  // Alerta si hay compras en error
  const errores = comprasHistorico.filter(c => c.estado === 'error_sincronizacion');
  if (errores.length > 0) {
    const bar = document.getElementById('alert-errores');
    bar.style.display = '';
    document.getElementById('alert-errores-text').innerHTML = `
      <strong>${errores.length} Compra${errores.length > 1 ? 's' : ''} con error de sincronización</strong> &middot; no impactaron stock en la API base.
    `;
    document.getElementById('alert-errores-link').addEventListener('click', (e) => {
      e.preventDefault();
      state.estados.clear();
      state.estados.add('error_sincronizacion');
      document.querySelectorAll('.chip-estado').forEach(ch => {
        ch.classList.toggle('chip-active', ch.dataset.estado === 'error_sincronizacion');
        ch.setAttribute('aria-pressed', ch.dataset.estado === 'error_sincronizacion');
      });
      renderTabla();
    });
  }

  // Proveedores — derivar de la lista de compras por nombre (id no siempre está)
  const selProv = document.getElementById('filter-proveedor');
  const proveedoresConCompras = proveedores.filter(p =>
    comprasHistorico.some(c => c.proveedorNombre === p.nombre)
  );
  proveedoresConCompras.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.nombre;
    opt.textContent = p.nombre;
    selProv.appendChild(opt);
  });

  const tbody = document.getElementById('comp-tbody');

  function filtrar() {
    const q = state.search.trim().toLowerCase();
    return comprasHistorico.filter(c => {
      if (state.proveedor && c.proveedorNombre !== state.proveedor) return false;
      if (state.estados.size > 0 && !state.estados.has(c.estado)) return false;
      if (state.desde && c.fechaFactura < state.desde) return false;
      if (state.hasta && c.fechaFactura > state.hasta) return false;
      if (q) {
        const txt = `${c.numero} ${c.ocNumero} ${c.proveedorNombre} ${c.nroComprobante}`.toLowerCase();
        if (!txt.includes(q)) return false;
      }
      return true;
    });
  }

  function linkDestino(c) {
    if (c.estado === 'en_verificacion' || c.estado === 'precargada' || c.estado === 'con_diferencias') {
      return 'compra-verificar.html';
    }
    // confirmada / anulada / error → placeholder lleva a compra-verificar (read-only en el futuro)
    return 'compra-verificar.html';
  }

  function rowHTML(c) {
    const b = ESTADO_BADGE[c.estado] || ESTADO_BADGE.precargada;
    return `
      <tr data-href="${linkDestino(c)}">
        <td class="text-mono"><strong>${c.numero}</strong></td>
        <td class="text-mono">
          <a href="oc-detalle.html?id=${encodeURIComponent(c.ocId)}" onclick="event.stopPropagation()">${c.ocNumero}</a>
        </td>
        <td>${c.proveedorNombre}</td>
        <td class="text-mono text-xs">${fmtFecha(c.fechaFactura)}</td>
        <td class="text-mono text-xs">${c.nroComprobante}</td>
        <td class="col-num">${fmtGs(c.totalFactura)}</td>
        <td><span class="badge ${b.cls}">${b.txt}</span></td>
        <td class="cell-center">
          <a class="btn btn-ghost btn-icon btn-sm" href="${linkDestino(c)}" title="Ver detalle" aria-label="Ver ${c.numero}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </a>
        </td>
      </tr>
    `;
  }

  function renderTabla() {
    const filtradas = filtrar();
    if (filtradas.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="8">
          <div class="empty-state">
            <h3>Sin resultados</h3>
            <p>Probá ajustar filtros o creá una nueva compra.</p>
          </div>
        </td></tr>
      `;
    } else {
      tbody.innerHTML = filtradas.map(rowHTML).join('');
    }
    document.getElementById('count-visible').textContent = filtradas.length;
    document.getElementById('count-total').textContent = `${comprasHistorico.length} compras`;
    document.getElementById('pagination-info').textContent = filtradas.length === 0
      ? 'Sin resultados'
      : `Mostrando ${filtradas.length} de ${comprasHistorico.length}`;
  }

  // Eventos
  document.getElementById('filter-search').addEventListener('input', (e) => { state.search = e.target.value; renderTabla(); });
  selProv.addEventListener('change', (e) => { state.proveedor = e.target.value; renderTabla(); });
  document.getElementById('filter-desde').addEventListener('change', (e) => { state.desde = e.target.value; renderTabla(); });
  document.getElementById('filter-hasta').addEventListener('change', (e) => { state.hasta = e.target.value; renderTabla(); });

  document.querySelectorAll('.chip-estado').forEach(chip => {
    chip.addEventListener('click', () => {
      const estado = chip.dataset.estado;
      if (state.estados.has(estado)) {
        state.estados.delete(estado);
        chip.classList.remove('chip-active');
        chip.setAttribute('aria-pressed', 'false');
      } else {
        state.estados.add(estado);
        chip.classList.add('chip-active');
        chip.setAttribute('aria-pressed', 'true');
      }
      renderTabla();
    });
  });

  tbody.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    const tr = e.target.closest('tr[data-href]');
    if (!tr) return;
    window.location.href = tr.dataset.href;
  });

  // App shell
  const app = document.getElementById('app');
  document.getElementById('btn-toggle-sidebar').addEventListener('click', () => {
    app.classList.toggle('sidebar-collapsed');
  });
  initSidebarClickOutside();

  initAvatarMenu({
    avatarBtnSelector: '#avatar-btn',
    logoutHref: '../logout.html',
    perfilHref: null,
    userName: 'Shirley',
    userRole: 'supervisor',
    userLocal: null,
  });

  renderTabla();

  updateAltasBadge({ mockSolicitudes: solicitudesAltaProducto });
</script>

</body>
</html>
