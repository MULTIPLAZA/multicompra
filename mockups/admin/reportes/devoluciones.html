<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>MultiCompra — Próximamente</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem('multicompra:theme');
      if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
  })();
</script>
<link rel="stylesheet" href="/shared/styles.css" />
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--sp-4);
    background: var(--bg);
  }
  .placeholder-card {
    max-width: 560px;
    text-align: center;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 56px 48px;
    box-shadow: var(--shadow);
  }
  .placeholder-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: var(--primary-soft);
    color: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .placeholder-card h1 {
    margin: 0 0 12px;
    color: var(--text-strong);
    font-size: var(--fs-xl);
  }
  .placeholder-card p {
    color: var(--text-muted);
    margin: 0 0 24px;
    line-height: 1.5;
  }
  .placeholder-card .actions {
    display: flex;
    gap: var(--sp-2);
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<div class="placeholder-card">
  <div class="placeholder-icon">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
  </div>
  <h1>Próximamente</h1>
  <p>
    Esta pantalla todavía está en desarrollo. La estamos integrando con el
    sistema base. Cuando esté lista, vamos a avisarte.
  </p>
  <div class="actions">
    <a href="javascript:history.back()" class="btn">← Volver</a>
    <a href="/supervisor/dashboard.html" class="btn btn-primary">Ir al dashboard</a>
  </div>
</div>

</body>
</html>
