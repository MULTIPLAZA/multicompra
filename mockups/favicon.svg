<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64">
  <!-- Fondo teal para contexto app (se ve cuando el logo no carga) -->
  <rect width="64" height="64" rx="14" fill="#0f766e"/>
  <!-- Logo Multitech circular embebido -->
  <image href="/MultitechLogo.jpg" x="2" y="2" width="60" height="60" clip-path="url(#clip-circle)"/>
  <defs>
    <clipPath id="clip-circle">
      <rect x="2" y="2" width="60" height="60" rx="30"/>
    </clipPath>
  </defs>
</svg>
