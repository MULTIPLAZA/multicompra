<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiCompra — Detalle de mi OP (Carolina)</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('multicompra:theme');
        if (!t) {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .cajera-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .cajera-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-6);
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      transition: background-color var(--t-theme), border-color var(--t-theme);
    }
    .cajera-header .logo { font-size: var(--fs-md); gap: var(--sp-2); }
    .cajera-hello {
      text-align: center;
      font-size: var(--fs-xl);
      font-weight: 600;
      color: var(--text-strong);
      line-height: 1.2;
    }
    .cajera-hello .local { color: var(--text-muted); font-weight: 500; }
    .cajera-hello .sep { color: var(--text-subtle); margin: 0 var(--sp-2); }
    .cajera-header .right {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      justify-self: end;
    }
    .cajera-header .avatar { width: 36px; height: 36px; font-size: var(--fs-md); }
    .cajera-header .btn-logout { height: 36px; font-size: var(--fs-md); }

    .cajera-topbar {
      display: flex;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-6);
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      justify-content: center;
      transition: background-color var(--t-theme), border-color var(--t-theme);
    }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-6);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-lg);
      color: var(--text-muted);
      font-size: var(--fs-lg);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--t-fast);
      text-decoration: none;
      min-width: 180px;
      justify-content: center;
    }
    .tab-btn:hover { background: var(--bg-elev-2); color: var(--text-strong); text-decoration: none; }
    .tab-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    .tab-btn svg { width: 20px; height: 20px; }

    .cajera-main {
      flex: 1;
      padding: var(--sp-6);
      display: flex;
      justify-content: center;
    }
    .cajera-container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      color: var(--primary);
      font-size: var(--fs-md);
      margin-bottom: var(--sp-2);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    .sub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-4);
      flex-wrap: wrap;
      padding-bottom: var(--sp-3);
      border-bottom: 1px solid var(--border);
    }
    .sub-header-main {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }
    .sub-header h1 {
      font-size: var(--fs-2xl);
      font-weight: 700;
      color: var(--text-strong);
      font-family: var(--font-mono);
    }
    .sub-header .meta {
      color: var(--text-muted);
      font-size: var(--fs-md);
    }

    .card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--sp-5) var(--sp-6);
      transition: background-color var(--t-theme), border-color var(--t-theme);
    }
    .card h2 {
      font-size: var(--fs-lg);
      font-weight: 600;
      color: var(--text-strong);
      margin-bottom: var(--sp-3);
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--sp-4);
    }
    .info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .info-label {
      font-size: var(--fs-xs);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }
    .info-value {
      font-size: var(--fs-md);
      color: var(--text-strong);
      font-weight: 500;
    }

    .excepcion-box {
      margin-top: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--warning-soft);
      border: 1px solid var(--warning);
      border-radius: var(--radius);
      color: var(--warning-text);
    }
    .excepcion-box .exc-label {
      font-weight: 700;
      text-transform: uppercase;
      font-size: var(--fs-xs);
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }

    .prod-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: var(--fs-md);
    }
    .prod-table thead th {
      text-align: left;
      padding: var(--sp-3);
      font-size: var(--fs-sm);
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }
    .prod-table tbody td {
      padding: var(--sp-3);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .prod-table tbody tr:last-child td { border-bottom: none; }
    .prod-col-cod { width: 180px; }
    .prod-col-qty { width: 120px; text-align: right; }
    .cod-mono {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      color: var(--text-muted);
    }
    .desc { font-size: var(--fs-md); color: var(--text-strong); font-weight: 500; }
    .qty-mono {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: var(--fs-lg);
      color: var(--text-strong);
      font-weight: 600;
    }

    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--sp-4);
      flex-wrap: wrap;
    }
    .state-msg {
      flex: 1;
      font-size: var(--fs-md);
      color: var(--text-muted);
      line-height: 1.5;
    }
    .state-msg.danger { color: var(--danger-text); }
    .state-msg.info { color: var(--info-text); }
    .state-msg strong { color: var(--text-strong); }

    .btn-big {
      height: 48px;
      padding: 0 var(--sp-5);
      font-size: var(--fs-md);
      font-weight: 600;
      border-radius: var(--radius-lg);
      min-width: 200px;
    }
    .btn-big.btn-primary {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }
    [data-theme="dark"] .btn-big.btn-primary { color: var(--bg); }
    .btn-big.btn-secondary {
      background: var(--bg-elev);
      color: var(--text-strong);
      border-color: var(--border-strong);
    }

    @media (max-width: 900px) {
      .cajera-header {
        grid-template-columns: auto auto;
        grid-template-rows: auto auto;
      }
      .cajera-hello { grid-column: 1 / -1; grid-row: 2; text-align: left; font-size: var(--fs-lg); }
      .cajera-topbar { overflow-x: auto; justify-content: flex-start; }
      .tab-btn { min-width: 140px; }
      .cajera-main { padding: var(--sp-3); }
      .card { padding: var(--sp-4); }
      .btn-big { width: 100%; min-width: 0; }
      .prod-col-cod { display: none; }
      .prod-table thead tr th:first-child { display: none; }
      .prod-table tbody td:first-child { display: none; }
    }
  </style>
</head>
<body>

<div class="cajera-shell">

  <header class="cajera-header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.2a2 2 0 0 0 2-1.6L21 8H6"/>
        <circle cx="9" cy="21" r="1.5"/>
        <circle cx="18" cy="21" r="1.5"/>
      </svg>
      <span class="logo-text">MultiCompra</span>
    </div>
    <div class="cajera-hello">
      Hola <span id="hello-name">Carolina</span>
      <span class="sep">&middot;</span>
      <span class="local" id="hello-local">Shopping del Sol</span>
    </div>
    <div class="right">
      <div class="user-chip" id="avatar-btn" tabindex="0" role="button" aria-label="Menú de usuario" aria-haspopup="true" aria-expanded="false">
        <div class="avatar" id="avatar-iniciales" aria-hidden="true">CA</div>
      </div>
    </div>
  </header>

  <nav class="cajera-topbar" aria-label="Navegación cajera">
    <a href="dashboard.html" class="tab-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/></svg>
      Inicio
    </a>
    <a href="op-nueva.html" class="tab-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Nueva OP
    </a>
    <a href="op-historial.html" class="tab-btn active" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>
      Historial
    </a>
    <a href="perfil.html" class="tab-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
      Perfil
    </a>
  </nav>

  <main class="cajera-main">
    <div class="cajera-container">

      <a href="op-historial.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Volver al historial
      </a>

      <div class="sub-header">
        <div class="sub-header-main">
          <h1 id="op-numero">Mi OP #OP-1055</h1>
          <span id="op-badge"></span>
        </div>
        <div class="meta">Enviada el <span id="op-fecha">-</span></div>
      </div>

      <!-- Datos principales -->
      <section class="card">
        <h2>Datos de la OP</h2>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Local</span>
            <span class="info-value" id="info-local">Shopping del Sol</span>
          </div>
          <div class="info-item">
            <span class="info-label">Cajera</span>
            <span class="info-value" id="info-cajera">Carolina</span>
          </div>
          <div class="info-item">
            <span class="info-label">Productos</span>
            <span class="info-value" id="info-prod">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">Unidades totales</span>
            <span class="info-value" id="info-unid">-</span>
          </div>
        </div>

        <div class="excepcion-box" id="exc-box" style="display: none;">
          <div class="exc-label">Marcada como excepción</div>
          <div id="exc-motivo">-</div>
        </div>
      </section>

      <!-- Productos -->
      <section class="card">
        <h2>Productos pedidos</h2>
        <table class="prod-table">
          <thead>
            <tr>
              <th class="prod-col-cod">Código</th>
              <th>Descripción</th>
              <th class="prod-col-qty">Cantidad</th>
            </tr>
          </thead>
          <tbody id="prod-body"></tbody>
        </table>
      </section>

      <!-- Acción según estado -->
      <section class="card action-bar" id="action-section">
        <div class="state-msg" id="state-msg">-</div>
        <div id="action-buttons"></div>
      </section>

    </div>
  </main>
</div>

<script type="module">
  import { cajeraActual as cajeraMock, productos, historialCajera } from '../shared/mock-data.js';
  import { initAvatarMenu } from '../shared/ui.js';

  // Usuario real desde localStorage. Fallback al mock.
  let cajeraActual = cajeraMock;
  try {
    const raw = localStorage.getItem('multicompra:user');
    if (raw) {
      const u = JSON.parse(raw);
      cajeraActual = {
        id: u.id, nombre: u.nombre, rol: u.rol,
        iniciales: u.iniciales || (u.nombre || '?').slice(0, 2).toUpperCase(),
        localId: u.localId, localNombre: u.localNombre || cajeraMock.localNombre
      };
    }
  } catch (_) {}

  document.getElementById('hello-name').textContent = cajeraActual.nombre;
  document.getElementById('hello-local').textContent = cajeraActual.localNombre;
  document.getElementById('avatar-iniciales').textContent = cajeraActual.iniciales;

  // Tomar ID del query string, fallback a op-1026 (devuelta) si no hay
  const params = new URLSearchParams(location.search);
  const opId = params.get('id') || 'op-1055';

  // Combinar OPs reales (las que esta cajera mandó desde la app) con historial mock
  let opsRealesCajera = [];
  let resolucionesOps = {};
  try {
    const todas = JSON.parse(localStorage.getItem('multicompra:ops_enviadas') || '[]');
    opsRealesCajera = todas.filter(op => op.cajeraId === cajeraActual.id);
  } catch (_) {}
  try {
    resolucionesOps = JSON.parse(localStorage.getItem('multicompra:ops_resoluciones') || '{}');
  } catch (_) {}

  // productoById combina mock + productos inline de las OPs reales
  const _productoById = new Map(productos.map(p => [p.id, p]));
  for (const opR of opsRealesCajera) {
    for (const l of opR.lineas) {
      if (!_productoById.has(l.productoId) && l.productoNombre) {
        _productoById.set(l.productoId, {
          id: l.productoId,
          nombre: l.productoNombre,
          barras: l.productoCodigo || ''
        });
      }
    }
  }
  // Hacer que el resto del script encuentre productoById como antes
  window.__productoById = _productoById;

  // Buscar en OPs reales primero, después en historial mock
  let op = null;
  const opReal = opsRealesCajera.find(o => o.id === opId);
  if (opReal) {
    const resol = resolucionesOps[opId];
    op = {
      id: opReal.id,
      fechaEnvio: opReal.fecha,
      estado: resol ? resol.estado : (opReal.estado || 'enviada'),
      esExcepcion: opReal.esExcepcion,
      motivoExcepcion: opReal.motivoExcepcion,
      notaDevolucion: resol && resol.estado === 'devuelta' ? resol.nota : null,
      lineas: opReal.lineas.map(l => ({ productoId: l.productoId, cantidad: l.cantidad }))
    };
  }
  if (!op) op = historialCajera.find(o => o.id === opId);
  if (!op) {
    // Sintético para op-1055 (la nueva del día) si no está en historial
    op = {
      id: opId,
      fechaEnvio: '2026-04-22 08:40',
      estado: 'enviada',
      esExcepcion: false,
      motivoExcepcion: null,
      notaDevolucion: null,
      lineas: [
        { productoId: 'p01', cantidad: 6 },
        { productoId: 'p05', cantidad: 4 },
        { productoId: 'p10', cantidad: 8 }
      ]
    };
  }

  // Si viene ?estado=borrador u otro, permite forzar estado para ver la variante
  const estadoForzado = params.get('estado');
  if (estadoForzado) op = { ...op, estado: estadoForzado };

  // Si es devuelta, redirigir a la pantalla específica
  if (op.estado === 'devuelta') {
    location.replace('op-devuelta.html?id=' + opId);
  }

  document.getElementById('op-numero').textContent = 'Mi OP #' + op.id.toUpperCase();
  document.getElementById('op-fecha').textContent = fmtFecha(op.fechaEnvio);

  // Badge
  const badgeMap = {
    'borrador':  { cls: 'badge-borrador',  label: 'Borrador' },
    'enviada':   { cls: 'badge-enviada',   label: 'Enviada' },
    'en_oc':     { cls: 'badge-en-oc',     label: 'En OC' },
    'cerrada':   { cls: 'badge-cerrada',   label: 'Cerrada' },
    'devuelta':  { cls: 'badge-devuelta',  label: 'Devuelta' },
    'anulada':   { cls: 'badge-anulada',   label: 'Anulada' }
  };
  const b = badgeMap[op.estado] || { cls: 'badge-borrador', label: op.estado };
  document.getElementById('op-badge').innerHTML = `<span class="badge ${b.cls}">${b.label}</span>`;

  // Info
  document.getElementById('info-prod').textContent = op.lineas.length;
  document.getElementById('info-unid').textContent = op.lineas.reduce((s, l) => s + l.cantidad, 0);

  // Excepción
  if (op.esExcepcion && op.motivoExcepcion) {
    document.getElementById('exc-box').style.display = 'block';
    document.getElementById('exc-motivo').textContent = op.motivoExcepcion;
  }

  // Productos — usamos el _productoById que combina mock + reales (definido arriba)
  const body = document.getElementById('prod-body');
  body.innerHTML = op.lineas.map(ln => {
    const p = _productoById.get(ln.productoId);
    if (!p) return '';
    return `
      <tr>
        <td class="prod-col-cod"><span class="cod-mono">${p.barras}</span></td>
        <td><span class="desc">${p.nombre}</span></td>
        <td class="prod-col-qty"><span class="qty-mono">${ln.cantidad}</span></td>
      </tr>
    `;
  }).join('');

  // Acciones según estado
  const stateMsgEl = document.getElementById('state-msg');
  const btnsEl = document.getElementById('action-buttons');
  switch (op.estado) {
    case 'borrador':
      stateMsgEl.innerHTML = 'Todavía no la enviaste. Podés seguir editándola.';
      stateMsgEl.className = 'state-msg';
      btnsEl.innerHTML = `<a href="op-nueva.html" class="btn btn-big btn-primary">Continuar editando</a>`;
      break;
    case 'enviada':
      stateMsgEl.innerHTML = '<strong>Esperando que Shirley la procese.</strong> Vas a ver el resultado acá cuando ella la revise. No podés crear otra OP hasta entonces.';
      stateMsgEl.className = 'state-msg info';
      btnsEl.innerHTML = `<a href="op-historial.html" class="btn btn-big btn-secondary">Volver</a>`;
      break;
    case 'en_oc':
      stateMsgEl.innerHTML = 'Ya fue incluida en una OC por Shirley. La compra está en proceso.';
      stateMsgEl.className = 'state-msg info';
      btnsEl.innerHTML = `<a href="op-historial.html" class="btn btn-big btn-secondary">Volver</a>`;
      break;
    case 'cerrada':
      stateMsgEl.innerHTML = 'Esta OP ya se cerró. La mercadería entró al circuito de compra.';
      stateMsgEl.className = 'state-msg';
      btnsEl.innerHTML = `<a href="op-historial.html" class="btn btn-big btn-secondary">Volver</a>`;
      break;
    case 'anulada':
      stateMsgEl.innerHTML = 'Esta OP fue anulada. No generó compra.';
      stateMsgEl.className = 'state-msg';
      btnsEl.innerHTML = `<a href="op-historial.html" class="btn btn-big btn-secondary">Volver</a>`;
      break;
    default:
      stateMsgEl.textContent = '-';
  }

  function fmtFecha(fechaStr) {
    if (!fechaStr) return '-';
    const [fecha, hora] = fechaStr.split(' ');
    const [y, m, d] = fecha.split('-');
    return `${d}/${m}/${y} ${hora || ''}`.trim();
  }

  initAvatarMenu({
    logoutHref: '../logout.html',
    perfilHref: 'perfil.html',
    userName: cajeraActual.nombre,
    userRole: cajeraActual.rol,
    userLocal: cajeraActual.localNombre,
  });
</script>

</body>
</html>
